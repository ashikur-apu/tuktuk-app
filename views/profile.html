<section id="view-profile" class="flex flex-col gap-md" style="max-width: 600px; margin: 0 auto; padding-top: 1rem;">
  
  <div class="card text-center flex flex-col items-center" style="gap: 1rem;">
    <div id="profile-avatar" style="width: 80px; height: 80px; background: var(--accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: bold; box-shadow: var(--card-shadow);">
      T
    </div>
    <div>
      <h2 id="profile-display-name" class="m-0" style="font-size: 1.6rem;">TukTuk Rider</h2>
      <p id="profile-display-profession" class="m-0 text-secondary" style="font-size: 0.95rem; margin-top: 4px;">Premium Achiever Account</p>
      <p id="profile-display-institution" class="m-0 text-accent font-bold" style="font-size: 0.85rem; margin-top: 4px;"></p>
    </div>
  </div>

  <div class="card">
    <h3 class="m-0 mb-md" style="font-size: 1.2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">📝 Edit Personal Info</h3>
    
    <div class="form-group">
      <label class="text-secondary" style="font-size: 0.85rem; font-weight: 600;">Full Name</label>
      <input type="text" id="profile-name-input" class="form-control" placeholder="Enter your full name...">
    </div>

    <div class="form-group">
      <label class="text-secondary" style="font-size: 0.85rem; font-weight: 600;">Profession / Role</label>
      <input type="text" id="profile-profession-input" class="form-control" placeholder="e.g., Student, Software Engineer...">
    </div>

    <div class="form-group">
      <label class="text-secondary" style="font-size: 0.85rem; font-weight: 600;">Institution / University</label>
      <input type="text" id="profile-institution-input" class="form-control" placeholder="e.g., Shahjalal University of Science and Technology...">
    </div>

    <div class="flex" style="gap: 1rem; margin-top: 1.5rem;">
      <button id="save-profile-btn" class="btn btn-accent" style="flex:1; justify-content: center;">💾 Save Info</button>
      <button id="reset-data-btn" class="btn" style="color: #dc3545; border-color: #dc3545;">Reset All Data</button>
    </div>
  </div>

</section>
