<section id="view-settings" class="flex flex-col gap-md" style="max-width: 800px; margin: 0 auto; padding-top: 1rem;">
  <div class="card flex flex-col gap-md">
    <h3 class="text-heading m-0 pb-sm" style="border-bottom: 1px solid var(--border-color); font-size: 1.3rem;">⚙️ System Settings</h3>
    
    <div class="flex justify-between items-center" style="flex-wrap: wrap; gap: 1rem;">
      <div>
        <h4 class="m-0" style="font-size: 1.1rem;">Toggle Light/Dark Mode</h4>
        <p class="text-secondary m-0" style="font-size: 0.85rem;">Adjust the brightness of your TukTuk suite workspace.</p>
      </div>
      <button id="settings-mode-toggle" class="btn">🌙 Toggle Mode</button>
    </div>
  </div>

  <div class="card">
    <h4 class="m-0 text-accent" style="font-size: 1.05rem; margin-bottom: 5px;">System Version:</h4>
    <p class="m-0 text-secondary" style="font-size: 0.85rem;">TukTuk Suite v2.0.0 (Modular Production Architecture)</p>
  </div>
</section>
