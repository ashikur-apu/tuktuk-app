<section id="view-analytics" class="flex flex-col gap-md" style="max-width: 800px; margin: 0 auto; padding-top: 1rem;">
  
  <div class="text-center mb-md">
    <h2 class="text-heading" style="font-size: 1.8rem; margin: 0;">📈 Your Progress Analytics</h2>
    <p class="text-secondary" style="font-size: 0.95rem;">Track your micro-task completion and focus hours over the full week.</p>
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; width: 100%;">
    <div class="card text-center">
      <h3 class="m-0 text-accent" style="font-size: 1.8rem;">12</h3>
      <p class="m-0 text-secondary" style="font-size: 0.85rem; margin-top: 5px;">Goals Ignited</p>
    </div>
    <div class="card text-center">
      <h3 class="m-0" style="font-size: 1.8rem; color: #4CAF50;" id="stats-crushed-count">0</h3>
      <p class="m-0 text-secondary" style="font-size: 0.85rem; margin-top: 5px;">Micro-Tasks Crushed</p>
    </div>
    <div class="card text-center">
      <h3 class="m-0" style="font-size: 1.8rem;">5.5 hrs</h3>
      <p class="m-0 text-secondary" style="font-size: 0.85rem; margin-top: 5px;">Total Focus Time</p>
    </div>
  </div>

  <div class="card">
    <h4 class="m-0 mb-sm" style="font-size: 1rem; text-align: left; color: var(--text-primary);">Weekly Performance Index (7-Day Analysis)</h4>
    
    <div class="chart-wrapper">
      <div class="chart-column">
        <div class="chart-bar empty" style="height: 15%;"></div>
        <span class="chart-label">Sat</span>
      </div>
      <div class="chart-column">
        <div class="chart-bar" style="height: 45%;"></div>
        <span class="chart-label">Sun</span>
      </div>
      <div class="chart-column">
        <div class="chart-bar" style="height: 85%;"></div>
        <span class="chart-label">Mon</span>
      </div>
      <div class="chart-column">
        <div class="chart-bar empty" style="height: 20%;"></div>
        <span class="chart-label">Tue</span>
      </div>
      <div class="chart-column">
        <div class="chart-bar" style="height: 60%;"></div>
        <span class="chart-label">Wed</span>
      </div>
      <div class="chart-column">
        <div class="chart-bar" style="height: 40%;"></div>
        <span class="chart-label">Thu</span>
      </div>
      <div class="chart-column">
        <div class="chart-bar empty" style="height: 10%;"></div>
        <span class="chart-label">Fri</span>
      </div>
    </div>
  </div>

</section>
