<!DOCTYPE html>
<html lang="en" data-color-mode="light" data-theme="default">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TukTuk</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="asset/logo.png" type="image/x-icon">
</head>

<body>

  <div id="mobile-top-bar">
    <button id="mobile-menu-trigger" class="btn" style="padding: 6px 12px; font-size: 0.9rem;">⚙️ Style</button>

    <div class="mobile-brand-center">
      <img src="asset/logo.png" alt="💡" style="height:22px;">
      <h1>TukTuk</h1>
    </div>
    <div style="width: 65px;"></div>

    <div id="mobile-style-dropdown" class="hidden-dropdown">
      <p
        style="margin: 0 0 6px 0; font-size: 0.8rem; font-weight: bold; color: var(--text-secondary); text-transform: uppercase;">
        Workspace</p>
      <div class="flex flex-col gap-xs">
        <select class="quick-switch-select theme-select-trigger" style="width: 100%; font-size: 0.85rem;">
          <option value="default">Neutral</option>
          <option value="masculine">Masculine</option>
          <option value="feminine">Feminine</option>
        </select>
        <button class="btn mode-toggle-trigger"
          style="width: 100%; justify-content: center; margin-top: 5px; font-size: 0.85rem;">🌙 Toggle Mode</button>

        <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 8px 0;">
        <p
          style="margin: 0 0 6px 0; font-size: 0.8rem; font-weight: bold; color: var(--text-secondary); text-transform: uppercase;">
          Navigation</p>

        <button class="btn mobile-dropdown-nav-btn" data-view="view-profile"
          style="width: 100%; justify-content: flex-start; font-size: 0.85rem;">👤 Profile</button>
        <button class="btn mobile-dropdown-nav-btn" data-view="view-settings"
          style="width: 100%; justify-content: flex-start; font-size: 0.85rem; margin-top: 4px;">⚙️ Settings</button>
      </div>
    </div>
  </div>

  <div id="app-shell">
    <div id="global-header-target"></div>

    <div id="desktop-sidebar-target"></div>

    <main id="view-viewport-wrapper"></main>
  </div>

  <nav id="mobile-navigation-bar">
    <button class="mobile-nav-btn" data-view="view-dashboard">🏠<span>Home</span></button>
    <button class="mobile-nav-btn" data-view="view-tasks">⚡<span>Tasks</span></button>
    <button class="mobile-nav-btn" data-view="view-analytics">📈<span>Stats</span></button>
    <button class="mobile-nav-btn" data-view="view-history">⏳<span>History</span></button>
  </nav>

  <script src="JS/theme.js"></script>
  <script src="JS/app.js"></script>
</body>

</html>
